<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل حرفيي غزة | منصة الخدمات المنزلية</title>
    
    <!-- الروابط الخارجية -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- ربط ملف التنسيق الخاص بك -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <i data-lucide="hammer"></i>
                <span>دليل حرفيي غزة</span>
            </div>
            <button class="btn-login">دخول الحرفيين</button>
        </div>
    </nav>

    <header class="hero">
        <h1>ابحث عن <span class="highlight">أفضل حرفيي غزة</span></h1>
        <p>نصلك بأمهر الفنيين في كافة محافظات قطاع غزة بكل سهولة وأمان.</p>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="ابحث عن نجار، سباك، أو كهربائي في منطقتك...">
            <button id="searchBtn">بحث</button>
        </div>
    </header>

    <main class="container">
        <div id="artisansGrid" class="grid">
            <!-- سيتم تعبئة البيانات بواسطة script.js -->
        </div>
    </main>

    <footer>
        <p>تم التطوير بواسطة [السيدة رهف] &copy; 2026</p>
        <p>فلسطين - قطاع غزة 🇵🇸</p>
    </footer>

    <!-- ربط ملف البرمجة الخاص بك -->
    <script src="script.js"></script>
</body>
</html>
